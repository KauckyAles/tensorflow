syntax = "proto3";

package xla.gpu;

import "xla/backends/gpu/runtime/collective_thunk.proto";
import "xla/core/collectives/reduction_kind.proto";
import "xla/service/gpu/launch_dimensions.proto";

option java_outer_classname = "CollectiveKernelThunkProto";
option java_multiple_files = true;

message CollectiveKernelThunkProto {
  // Config fields for building the collective thunk.
  CollectiveConfigProto collective_config = 1;
  xla.ReductionKindProto reduction_kind = 2;
  bool is_async = 3;
  repeated CollectiveBufferProto buffers = 4;
  bool collective_kernel_enabled = 5;
  string kernel_name = 6;
  optional LaunchDimensionsProto launch_dimensions = 7;
  int32 shmem_bytes = 8;
  bool is_multimem_enabled = 9;
  optional bytes cubin = 10;
  bool use_pdl = 11;
}
